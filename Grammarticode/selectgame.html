<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Selection - Hangman & Name Picker</title>
      <link rel="stylesheet" href="selectgame.css">
    <style>
        body {
            background: linear-gradient(135deg,
                #000000 0%,
                #0a0a0a 25%,
                #1a1a1a 50%,
                #c8a951 75%,
                #000000 100%
            );
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* background glow */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 80%, rgba(220,20,60,0.3), transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139,0,0,0.4), transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(255,107,107,0.2), transparent 50%);
            z-index: -1;
        }

        /* MAIN MENU */
        .menu {
            background: linear-gradient(135deg, #ad1f1f, #882323, #7a1818, #9c2121, #e43535);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            width: 900px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* TITLE */
        .title {
            background: #c8a951;
            color: white;
            padding: 12px;
            border-radius: 10px;
            width: 200px;
            margin: auto;
            font-weight: bold;
        }

        /* GAME CONTAINER */
        .games {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
        }

        /* CARD */
        .game-card {
            background: #ffd17a;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            width: 320px;
            text-align: center;
            border: 4px solid transparent;
            transition: 0.3s;
        }

        .game-card.selected {
            border: 4px solid #c8a951;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(200, 169, 81, 0.6);
        }

        /* IMAGE */
        .game-card img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 8px;
        }

        .game-card p {
            font-weight: bold;
            font-size: 1.2rem;
            color: #333;
        }

        /* BUTTONS */
        .buttons {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            background: #c8a951;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #2e2e2e;
        }
    </style>
</head>
<body>

    <div class="menu">
        <div class="title">GAME SELECT</div>

        <div class="games">
            <div class="game-card" id="card-hangman" onclick="selectGame('hangman')">
                <img src="images/hangman.png" alt="Hangman">
                <p>Hangman</p>
            </div>

            <div class="game-card" id="card-picker" onclick="selectGame('picker')">
                <img src="images/quiz.png" alt="Name Picker">
                <p>Quiz</p>
            </div>
        </div>

        <div class="buttons">
            <button onclick="goBack()">BACK</button>
            <button onclick="confirmSelection()">SELECT</button>
        </div>
    </div>

    <script>
        let currentChoice = "";

        // Function for selecting a card
        function selectGame(gameName) {
            currentChoice = gameName;

            // Remove highlight from all cards
            document.querySelectorAll('.game-card').forEach(card => {
                card.classList.remove('selected');
            });

            // Add highlight to the selected card
            const selectedCard = (gameName === 'hangman') ? 
                document.getElementById('card-hangman') : 
                document.getElementById('card-picker');
            
            selectedCard.classList.add('selected');
            console.log("Current choice: " + currentChoice);
        }

        // Function for the SELECT button
        function confirmSelection() {
            if (currentChoice === "hangman") {
                window.location.href = "picker1.html";
            } else if (currentChoice === "picker") {
                window.location.href = "picker.html";
            } else {
                alert("Please select a game first!");
            }
        }

        // Function for the BACK button
        function goBack() {
            window.location.href = "home.html";
        }
    </script>

</body>
</html>
